version: 2

models:
  - name: E1_orders_2023_count
    description: >
      Aggregated count of all orders placed in the year 2023
    
    columns:
      - name: orders_2023
        description: Number of orders placed in 2023

  - name: E2_orders_2023_monthly
    description: >
      Number of orders per month in the year 2023
      One row per calendar month
    
    columns:
      - name: order_month
        description: Month of the order, in the format YYYY-MM
      - name: number_of_orders
        description: Total number of orders placed during the month

  - name: E3_orders_products_monthly
    description: >
      Average products placed per order in 2023
    
    columns:
      - name: order_month
        description: Month of the order, in the format YYYY-MM
      - name: avg_products_per_order
        description: Average number of products ordered per order

  - name: E4_orders_with_qty
    description: >
      Aggregated table of all orders in 2022 and 2023,
      with one row per order and the total quantity of products per order.
    columns:
      - name: order_id
        description: Unique identifier for each order
        tests:
          - not_null
          - unique
      - name: customer_id
        description: Unique identifier of the customer who placed the order
        tests:
          - not_null
      - name: order_date
        description: Date when the order was placed
        tests:
          - not_null
      - name: net_sales
        description: Total amount of the order in currency units
      - name: qty_product
        description: Total quantity of products in the order
        tests:
          - not_null

  - name: E5_orders_segmented
    description: >
      Orders in 2023 segmented into New / Returning / VIP
      based on the number of past orders in the previous 12 months.
    columns:
      - name: order_id
        description: Unique identifier for each order
        tests:
          - not_null
          - unique
      - name: customer_id
        description: Unique identifier for the customer who placed the order
        tests:
          - not_null
      - name: order_date
        description: Date of the order
        tests:
          - not_null
      - name: order_segment
        description: Segment of the order based on customer's past 12 months order count (New, Returning, VIP)
        tests:
          - not_null