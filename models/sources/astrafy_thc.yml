version: 2

sources:
  - name: astrafy_thc
    description: >
      Raw dataset provided for the Astrafy technical exercise.
      Data was loaded from CSV files into BigQuery.
      The only transformation was the conversion from XLSX type of files to CSV for ingestion into BigQuery.
    
    database: astrafy-thc-488420
    schema: astrafy_thc
    
    tables:
      - name: orders_rectrutments
        description: >
          Raw orders table. One row represents one order.
          Contains columns: date, order id, customer id and net sales.
          Dates from: 01-01-2022 and 31-12-2023
        
      - name: sales_recrutments
        description: >
          Raw sales table. One row represent one order per product.
          Contains columns: date, customer id, order id, product id, net sales and quantity.
          Dates from: 01-01-2022 and 31-12-2023
